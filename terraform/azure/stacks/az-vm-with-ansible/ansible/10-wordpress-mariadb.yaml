---
- name: Set up WordPress site on Ubuntu 22.04/24.04
  hosts: localhost
  become: yes
  vars:
    setup_wordpress_mariadb: false | bool
    domain_name: "oic.flexidev.dev"
    mariadb_root_password: "Your-Root9-Password3-Change"  # Change this to a strong password
    mariadb_wordpress_db: "wordpress_db"
    mariadb_wordpress_user: "wordpress_user"
    mariadb_wordpress_password: "Your3-User1-Password2"  # Change this to a strong password
    php_version: "8.1"  # Change this to the desired PHP version

  tasks:
    - block:
        - name: Update APT package index
          apt:
            update_cache: yes

        - name: Install software-properties-common
          apt:
            name: software-properties-common
            state: present

        - name: Install pip
          apt:
            name: python3-pip
            state: present

        - name: Add PHP PPA repository
          apt_repository:
            repo: ppa:ondrej/php
            state: present
            update_cache: yes

        - name: Install Apache
          apt:
            name: apache2
            state: latest

        - name: Enable Apache modules
          command: a2enmod rewrite
          notify:
            - Restart Apache

        - name: Create Apache virtual host configuration for {{ domain_name }}
          template:
            src: templates/apache_vhost.conf.j2
            dest: "/etc/apache2/sites-available/{{ domain_name }}.conf"
          notify:
            - Enable Virtual Host

        - name: Disable default Apache site
          command: a2dissite 000-default.conf
          notify:
            - Restart Apache

        - name: Install PHP {{ php_version }} and required extensions
          apt:
            name:
              - php{{ php_version }}
              - php{{ php_version }}-mysql
              - php{{ php_version }}-xml
              - php{{ php_version }}-curl
              - php{{ php_version }}-gd
              - php{{ php_version }}-mbstring
              - php{{ php_version }}-zip
              - php{{ php_version }}-bcmath
              - php{{ php_version }}-xmlrpc
              - php{{ php_version }}-imagick
              - php{{ php_version }}-redis
              - php{{ php_version }}-memcached
              - php{{ php_version }}-intl
              - php{{ php_version }}-common
            state: latest

        - name: Update PHP settings for WordPress
          template:
            src: templates/php.ini.j2
            dest: "/etc/php/{{ php_version }}/apache2/php.ini"
          notify:
            - Restart Apache

        - name: Hardening Apache Configuration - Hide Server Information
          template:
            src: templates/security.conf.j2
            dest: /etc/apache2/conf-available/security.conf
          notify:
            - Restart Apache

        - name: Enable Apache security configuration
          command: a2enconf security
          notify:
            - Restart Apache
        ######## WORDPRESS ########    
        - name: Download latest WordPress
          get_url:
            url: https://wordpress.org/latest.tar.gz
            dest: /tmp/latest.tar.gz

        # - name: Create WordPress site directory
        #   file:
        #     path: "/var/www/{{ domain_name }}"
        #     state: directory
        #     owner: www-data
        #     group: www-data
        #     mode: '0755'

        - name: Extract WordPress
          unarchive:
            src: /tmp/latest.tar.gz
            dest: /tmp
            remote_src: yes
            creates: /tmp/wordpress/wp-admin.php

        - name: Move extracted WordPress files
          command: mv /tmp/wordpress /var/www/{{ domain_name }}

        - name: Remove wordpress.tar.gz
          file: path=/tmp/wordpress.tar.gz state=absent

        - name: Fetch WordPress secret keys
          command: curl -s https://api.wordpress.org/secret-key/1.1/salt/
          register: wordpress_salt

        - name: Create wp-config.php for WordPress
          template:
            src: templates/wp-config.php.j2
            dest: /var/www/{{ domain_name }}/wp-config.php

        - name: Set permissions for WordPress directory
          file:
            path: /var/www/{{ domain_name }}
            owner: www-data
            group: www-data
            recurse: yes
            state: directory

        - name: Change ownership of wp-content directory
          file:
            path: /var/www/{{ domain_name }}/wp-content
            owner: www-data
            group: www-data
            mode: '0755'
            state: directory
            recurse: yes

        ######## MARIADB ########
        - name: Install MariaDB server
          apt:
            name: mariadb-server
            state: latest

        - name: Configure MariaDB to listen on all interfaces
          lineinfile:
            path: /etc/mysql/mariadb.conf.d/50-server.cnf
            regexp: '^bind-address'
            line: 'bind-address = 0.0.0.0'
          notify:
            - Restart MariaDB

        - name: Ensure Python venv is installed
          apt:
            name: python3-venv
            state: present

        - name: Create a virtual environment for PyMySQL
          command:
            cmd: python3 -m venv /opt/pymysql_venv
            creates: /opt/pymysql_venv/bin/activate

        - name: Install PyMySQL in the virtual environment
          command:
            cmd: /opt/pymysql_venv/bin/pip install PyMySQL
            creates: /opt/pymysql_venv/lib/python3.10/site-packages/PyMySQL

        - name: Set ansible_python_interpreter to virtual environment
          set_fact:
            ansible_python_interpreter: /opt/pymysql_venv/bin/python3

        # - name: Install PyMySQL library for Python 3
        #   pip:
        #     name: PyMySQL
        #     state: present
        - name: Remove test database and access
          mysql_db:
            name: test
            state: absent
          ignore_errors: yes
        - name: Secure MariaDB installation (set root password and remove test database)
          block:
            - name: Set root password for MariaDB
              mysql_user:
                name: root
                password: "{{ mariadb_root_password }}"
                host_all: yes
                state: present
                login_unix_socket: /var/run/mysqld/mysqld.sock

        - name: Create MariaDB database for WordPress
          mysql_db:
            name: "{{ mariadb_wordpress_db }}"
            state: present
            login_user: root
            login_password: "{{ mariadb_root_password }}"
            login_host: localhost

        - name: Create MariaDB user for WordPress
          mysql_user:
            name: "{{ mariadb_wordpress_user }}"
            password: "{{ mariadb_wordpress_password }}"
            priv: "{{ mariadb_wordpress_db }}.*:ALL"
            host: "%"
            state: present
            login_user: root
            login_password: "{{ mariadb_root_password }}"

      when: setup_wordpress_mariadb | bool  # Apply to the entire block

  handlers:
    - name: Restart Apache
      service:
        name: apache2
        state: restarted

    - name: Restart MariaDB
      service:
        name: mariadb
        state: restarted

    - name: Enable Virtual Host
      command: a2ensite {{ domain_name }}.conf
      notify:
        - Restart Apache
