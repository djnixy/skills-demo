---
- name: Installing Docker
  hosts: localhost
  become: yes
  vars:
    docker_repo_url: "https://download.docker.com/linux/ubuntu"
  
  tasks:
    - name: Only run "update_cache=yes" if the last one is more than 3600 seconds ago
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Uninstalling Previous Version of Docker (if any)
      apt:
        name: ['docker', 'docker.io', 'docker-client-latest', 'containerd', 'runc', 'docker-engine']
        state: absent

    - name: Install aptitude using apt
      apt:
        name: aptitude
        state: latest
        update_cache: yes
        force_apt_get: yes

    - name: Install required system packages
      apt:
        name: "{{ item }}"
        state: latest
        update_cache: yes
      loop:
        - apt-transport-https
        - ca-certificates
        - curl
        - software-properties-common
        - htop
        - net-tools
        - nano
        - python3
        - python3-venv
        - certbot 
        - tree

    - name: Add Docker GPG apt Key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Determine Ubuntu distribution codename
      command: lsb_release -cs
      register: distro_codename

    - name: Set up the stable Docker repository for Jammy or Noble
      apt_repository:
        repo: "deb [arch=amd64] {{ docker_repo_url }} {{ distro_codename.stdout }} stable"
        state: present

    - name: Run the equivalent of "apt-get update" as a separate step
      apt:
        update_cache: yes

    - name: Installing Docker
      apt:
        name: ['docker-ce', 'docker-ce-cli', 'containerd.io', 'docker-compose-plugin']
        state: latest

    - name: Starting Docker service
      service:
        name: docker
        state: started

    - name: Enabling Docker service
      service:
        name: docker
        enabled: yes

    - name: Adding user 'ubuntu' to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes
