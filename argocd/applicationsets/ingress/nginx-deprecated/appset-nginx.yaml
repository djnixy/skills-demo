## references:
## https://github.com/kubernetes/ingress-nginx
## https://github.com/kubernetes/ingress-nginx/blob/main/charts/ingress-nginx/values.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: nginx-ingress-stack
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - cluster: do-sgp1-demo-nonprod-sg
            env: nonprod-sg
            namespace: default
            replicaCount: "2"
            lbName: "lb-demo-nonprod"
            minReplicas: "2"
            maxReplicas: "3"
            
          - cluster: do-sgp1-demo-production-sg
            env: prod-sg
            namespace: default
            replicaCount: "2"
            lbName: "lb-demo-prod-sg"
            minReplicas: "2"
            maxReplicas: "3"

          - cluster: do-syd1-demo-production-au
            env: prod-au
            namespace: default
            replicaCount: "2"
            lbName: "lb-demo-prod-au"
            minReplicas: "2"
            maxReplicas: "3"

  template:
    metadata:
      name: 'ingress-nginx-{{env}}'
    spec:
      project: ingress
      source:
        repoURL: https://kubernetes.github.io/ingress-nginx
        chart: ingress-nginx
        targetRevision: 4.13.3
        helm:
          releaseName: nginx-ingress
          values: |
            controller:
              replicaCount: {{replicaCount}}
              publishService:
                enabled: true
              service:
                annotations:
                  service.beta.kubernetes.io/do-loadbalancer-name: "{{lbName}}"
                  service.beta.kubernetes.io/do-loadbalancer-http-idle-timeout-seconds: "300"
                  service.beta.kubernetes.io/do-loadbalancer-enable-backend-keepalive: "true"
              autoscaling:
                enabled: false
                minReplicas: {{minReplicas}}
                maxReplicas: {{maxReplicas}}
              metrics:
                enabled: true
                serviceMonitor:
                  enabled: true
                  namespace: {{namespace}}
                  namespaceSelector:
                    matchNames:
                      - {{namespace}}
              # podAnnotations:
              #   prometheus.io/scrape: "true"
              #   prometheus.io/port: "10254"

              config:
                # proxy-body-size: "3000m"
                server-tokens: "false"
                ssl-protocols: "TLSv1.2 TLSv1.3"
                ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"
                hsts: "true"
                hsts-max-age: "63072000"
                hsts-include-subdomains: "true"
                hsts-preload: "true"
                ssl-redirect: "true"
                force-ssl-redirect: "true"
                proxy-buffer-size: "128k"
                proxy-buffers: "4 256k"
                proxy-busy-buffers-size: "256k"
                # enable-modsecurity: "true"
                # Update ModSecurity config and rules
                # modsecurity-snippet: |
                  # # this enables the mod security nextcloud plugin
                  # Include /etc/nginx/owasp-modsecurity-crs/plugins/nextcloud-rule-exclusions-before.conf

                  # # this enables the default OWASP Core Rule Set
                  # Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf

                  # # Enable prevention mode. Options: DetectionOnly,On,Off (default is DetectionOnly)
                  # SecRuleEngine On

                  # # Enable scanning of the request body
                  # SecRequestBodyAccess On

                  # # Enable XML and JSON parsing
                  # SecRule REQUEST_HEADERS:Content-Type "(?:text|application(?:/soap\+|/)|application/xml)/" \
                  #   "id:200000,phase:1,t:none,t:lowercase,pass,nolog,ctl:requestBodyProcessor=XML"

                  # SecRule REQUEST_HEADERS:Content-Type "application/json" \
                  #   "id:200001,phase:1,t:none,t:lowercase,pass,nolog,ctl:requestBodyProcessor=JSON"

                  # # Reject if larger (we could also let it pass with ProcessPartial)
                  # SecRequestBodyLimitAction Reject

                  # # Send ModSecurity audit logs to the stdout (only for rejected requests)
                  # SecAuditLog /dev/stdout

                  # # format the logs in JSON
                  # SecAuditLogFormat JSON

                  # # could be On/Off/RelevantOnly
                  # SecAuditEngine RelevantOnly

              # Add a volume for the plugins directory
              # extraVolumes:
              #   - name: plugins
              #     configMap:
              #       name: modsecurity-plugins

              # # override the /etc/nginx/enable-owasp-modsecurity-crs/plugins with your ConfigMap
              # extraVolumeMounts:
              #   - name: plugins
              #     mountPath: /etc/nginx/owasp-modsecurity-crs/plugins

      destination:
        name: '{{cluster}}'
        namespace: '{{namespace}}'
      
      # syncPolicy:
      #   automated:
      #     prune: true
      #     selfHeal: true
      #   syncOptions:
      #     - CreateNamespace=true