apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: traefik-ingress-stack
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - cluster: do-sgp1-demo-nonprod-sg
            env: nonprod-sg
            namespace: traefik
            replicaCount: "1" 
            lbName: "lb-demo-nonprod-test"
            minReplicas: "1"
            maxReplicas: "1"

  template:
    metadata:
      name: 'traefik-{{env}}'
    spec:
      project: ingress
      source:
        repoURL: ghcr.io/traefik/helm
        chart: traefik
        targetRevision: 34.0.0
        helm:
          releaseName: traefik
          values: |
            deployment:
              replicas: {{replicaCount}}
            ports:
              web:
                port: 8000
                expose:
                  default: true
                exposedPort: 80
                protocol: TCP
              websecure:
                port: 8443
                expose:
                  default: true
                exposedPort: 443
                protocol: TCP
                tls:
                  enabled: true

            service:
              annotations:
                service.beta.kubernetes.io/do-loadbalancer-name: "{{lbName}}"
                service.beta.kubernetes.io/do-loadbalancer-http-idle-timeout-seconds: "300"
                service.beta.kubernetes.io/do-loadbalancer-enable-backend-keepalive: "true"

            autoscaling:
              enabled: false
              minReplicas: {{minReplicas}}
              maxReplicas: {{maxReplicas}}

            metrics:
              prometheus:
                entryPoint: metrics
                serviceMonitor:
                  enabled: true
                  namespace: {{namespace}}

            tlsOptions:
              default:
                minVersion: VersionTLS12
                cipherSuites:
                  - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
                  - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
                  - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
                  - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384

            # Middleware reference
            additionalArguments:
              - "--entrypoints.websecure.http.middlewares={{namespace}}-security-headers@kubernetescrd"

            providers:
              kubernetesIngress:
                publishedService:
                  enabled: true

            # Middleware Definition
            extraObjects:
              - apiVersion: traefik.io/v1alpha1
                kind: Middleware
                metadata:
                  name: security-headers
                  namespace: {{namespace}}
                spec:
                  headers:
                    forceSTSHeader: true
                    stsSeconds: 63072000
                    stsIncludeSubdomains: true
                    stsPreload: true
                    customResponseHeaders:
                      X-Powered-By: ""
                      Server: ""
              - apiVersion: traefik.io/v1alpha1
                kind: Middleware
                metadata:
                  name: redirect-https
                  namespace: {{namespace}}
                spec:
                  redirectScheme:
                    scheme: https
                    permanent: true
      destination:
        name: '{{cluster}}'
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true