        #         receiver: 'smtp'
        #     receivers:
        #     - name: 'smtp'
        #       email_configs:
        #       - to: 'niki@demo.com'
        #         require_tls: false
        #     templates:
        #     - '/etc/alertmanager/config/*.tmpl'

        prometheusOperator:
          resources:
            requests:
              memory: 40Mi
            limits:
              memory: 40Mi

        prometheus-node-exporter:
          resources:
            requests:
              memory: 30Mi
            limits:
              memory: 30Mi

        kube-state-metrics:
          resources:
            requests:
              memory: 100Mi
            limits:
              memory: 100Mi
  destination:
    name: do-sgp1-demo-production-sg
    namespace: monitoring
  syncPolicy:
    # automated:
    #   prune: true
    #   selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true