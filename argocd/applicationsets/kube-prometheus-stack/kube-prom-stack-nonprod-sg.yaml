apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kps-nonprod-sg
  namespace: argocd
spec:
  project: kube-prometheus-stack
  revisionHistoryLimit: 3
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    # targetRevision: 79.7.1
    targetRevision: 84.5.0
    helm:
      releaseName: kps
      values: |
        fullnameOverride: kps

        blackboxExporter:
          config:
            modules:
              http_2xx:
                prober: https
                timeout: 5s
                http:
                  valid_status_codes: [200]
                  method: GET

        grafana:
          enabled: false

        prometheusOperator:
          resources:
            requests:
              memory: 40Mi
            limits:
              memory: 40Mi

        prometheus:
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              nginx.ingress.kubernetes.io/auth-type: basic
              nginx.ingress.kubernetes.io/auth-secret: bws-kps-nonprod-sg
              nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
            hosts:
              - prom-nonprod-sg.tc.demo.com
            tls:
              - hosts:
                  - prom-nonprod-sg.tc.demo.com
                secretName: prom-nonprod-sg-tc-demo-com-tls
          prometheusSpec:
            podMonitorSelectorNilUsesHelmValues: false
            serviceMonitorSelectorNilUsesHelmValues: false
            retentionSize: 4GB
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: do-block-storage
                  resources:
                    requests:
                      storage: 5Gi
            resources:
              requests:
                memory: 1100Mi
              limits:
                memory: 1100Mi

        alertmanager:
          enabled: false

        prometheus-node-exporter:
          resources:
            requests:
              memory: 20Mi
            limits:
              memory: 20Mi

        kube-state-metrics:
          resources:
            requests:
              memory: 80Mi
            limits:
              memory: 80Mi
  destination:
    name: do-sgp1-demo-nonprod-sg
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true