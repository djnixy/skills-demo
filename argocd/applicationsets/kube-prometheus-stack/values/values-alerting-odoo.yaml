# values-alerting-odoo.yaml
grafana:
  alerting:
    filepermission-rules.yaml:
      apiVersion: 1
      groups:
        - orgId: 1
          name: "application-file-permission-alerts"
          folder: "Application Health & Logs"
          interval: 1m
          rules:
            - uid: "app_permission_onit"
              title: "App Error: Onitburgers File Permission"
              condition: "C"
              for: 0m
              noDataState: OK
              execErrState: Error
              labels:
                severity: "critical"
                team: "devops"
                app_instance: "demo-core-onitburgers"
              annotations:
                summary: "Permission Error on Onitburgers"
                description: 'Instance {{ "{{" }} $labels.instance {{ "}}" }} reported PermissionError (Errno 13). Requires storage/permission check.'
              data:
                - refId: "A"
                  datasourceUid: "loki"
                  queryType: "range"
                  relativeTimeRange: { from: 300, to: 0 }
                  model:
                    editorMode: "code"
                    # FIXED: Double-escaped brackets \\[ and \\]
                    expr: 'count_over_time({instance="demo-core-onitburgers"} |~ "(?i)PermissionError: \\[Errno 13\\] Permission denied: .* filestore" [5m])'
                    refId: "A"
                - refId: "B"
                  datasourceUid: "__expr__"
                  queryType: "reduce"
                  model: { expression: "A", reducer: "sum", refId: "B", type: "reduce" }
                - refId: "C"
                  datasourceUid: "__expr__"
                  queryType: "math"
                  model: { expression: "$B > 0", refId: "C", type: "math" }
                  
