apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-traefik-stage
  namespace: cert-manager
spec:
  acme:
    email: devops@demo.com
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: demo-traefik-stage-key
    solvers:
    - http01:
        ingress:
          class: traefik