# FILE: argocd/applicationsets/external-dns/appset-external-dns.yaml
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: external-dns
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: external-dns-aws-nonprod-sg
            cluster: do-sgp1-demo-nonprod-sg
            authTokenSecretName: bwsmma-auth-token-external-dns
            secretKeyName1: aws_access_key_id
            bwSecretId1: 647a5cde-bde8-4ffa-a90e-b38b002d9f05
            secretKeyName2: aws_secret_access_key
            bwSecretId2: a3fd1983-1ffb-44eb-aa5f-b38b002dcbdb
          - name: external-dns-aws-prod-sg
            cluster: do-sgp1-demo-production-sg
            authTokenSecretName: bwsmma-auth-token-external-dns
            secretKeyName1: aws_access_key_id
            bwSecretId1: 647a5cde-bde8-4ffa-a90e-b38b002d9f05
            secretKeyName2: aws_secret_access_key
            bwSecretId2: a3fd1983-1ffb-44eb-aa5f-b38b002dcbdb
          - name: external-dns-aws-prod-au
            cluster: do-syd1-demo-production-au
            authTokenSecretName: bwsmma-auth-token-external-dns
            secretKeyName1: aws_access_key_id
            bwSecretId1: 647a5cde-bde8-4ffa-a90e-b38b002d9f05
            secretKeyName2: aws_secret_access_key
            bwSecretId2: a3fd1983-1ffb-44eb-aa5f-b38b002dcbdb
  template:
    metadata:
      name: "{{name}}"
    spec:
      project: external-dns
      sources:
        - repoURL: https://github.com/djnixy/my-gitops-infra-stack
          targetRevision: main
          path: argocd/applicationsets/external-dns/credentials
          kustomize:
            patches:
              - patch: |
                  [
                    { "op": "replace", "path": "/metadata/name", "value": "bws-{{name}}" },
                    { "op": "replace", "path": "/spec/secretName", "value": "bws-{{name}}" },
                    { "op": "replace", "path": "/spec/authToken/secretName", "value": "{{authTokenSecretName}}" },
                    {
                      "op": "replace",
                      "path": "/spec/map",
                      "value": [
                        { "secretKeyName": "{{secretKeyName1}}", "bwSecretId": "{{bwSecretId1}}" },
                        { "secretKeyName": "{{secretKeyName2}}", "bwSecretId": "{{bwSecretId2}}" }
                      ]
                    }
                  ]
                target:
                  kind: BitwardenSecret
                  name: placeholder

        # --- External-DNS chart ---
        - repoURL: https://kubernetes-sigs.github.io/external-dns/
          chart: external-dns
          targetRevision: 1.19.0
          helm:
            values: |
              provider: aws
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: "bws-{{name}}"
                      key: "{{secretKeyName1}}"
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: "bws-{{name}}"
                      key: "{{secretKeyName2}}"
                - name: AWS_REGION
                  value: us-east-1
              txtOwnerId: "{{name}}"
              domainFilters:
                - demo.com.au
                - demo.com
              policy: sync
              registry: txt
              logLevel: info

              resources:
                requests:
                  cpu: 25m
                  memory: 50Mi
                limits:
                  cpu: 25m
                  memory: 50Mi
              serviceAccount:
                create: true
                annotations: {}

      destination:
        name: "{{cluster}}"
        namespace: external-dns
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
        automated:
          prune: true
          selfHeal: true