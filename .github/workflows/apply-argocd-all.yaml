name: Apply ArgoCD Configuration - All

on:
  workflow_dispatch:
    paths:
      - 'argocd/applicationsets/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  apply-argocd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0

      - name: Install doctl
        uses: digitalocean/action-doctl@3cb3953159719656269e044e0e24ca16dd2a690f # v2.5.2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - name: Configure kubeconfig for demo-production-sg
        continue-on-error: true
        run: |
          doctl kubernetes cluster kubeconfig save demo-production-sg
          
      - name: Apply ArgoCD ApplicationSets
        continue-on-error: true
        run: |
          if [ -d argocd/applicationsets ]; then
            echo "Applying ArgoCD ApplicationSets..."
            
            # Find all .yaml files, but:
            # 1. Exclude paths containing 'credentials'
            # 2. Exclude paths containing 'database'
            # 3. Exclude paths containing 'cnpg'
            # 4. Exclude files starting with 'bws'
            # 5. Exclude files starting with 'cnpg'

            find argocd/applicationsets -type f -name "*.yaml" \
              -not -path "*/credentials/*" \
              -not -path "*credential*" \
              -not -path "*database*" \
              -not -path "*cnpg*" \
              -not -path "*/bws*" \
              -not -path "*components*" \
              -not -path "*value*" \
              -not -name "bws*" \
              -not -name "cnpg*" \
              -not -name "*value*" \
            | while read -r file; do
              
              # Skip empty files
              if [ ! -s "$file" ]; then
                echo "Skipping empty file: $file"
                continue
              fi

              # Skip files that are comment-only or blank
              if grep -qE '^[^#[:space:]]' "$file"; then
                echo "Applying: $file"
                kubectl apply -f "$file"
              else
                echo "Skipping comment-only or blank YAML: $file"
              fi
            done
          fi