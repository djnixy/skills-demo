---
- name: Base System Setup
  hosts: all
  become: yes
  tasks:
    - name: Notify start of deployment
      ansible.builtin.uri:
        url: https://ntfy.sh/demo
        method: POST
        body: "Step 1: Base setup started (Ansible)..."
        return_content: yes
      ignore_errors: true

    - name: Update and upgrade apt packages
      ansible.builtin.apt:
        update_cache: yes
        upgrade: yes

    - name: Install base prerequisite packages and tree
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - lsb-release
          - gnupg
          - tree
          - postgresql-client-common
          - net-tools
        state: present

    - name: Create directory for apt keyrings
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker's official GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'
        force: true

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' if ansible_architecture == 'aarch64' else ansible_architecture }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install Docker components
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Ensure users exist and are in appropriate groups
      ansible.builtin.user:
        name: "{{ item }}"
        state: present
        groups: sudo,docker
        append: yes
        shell: /bin/bash
      loop:
        - ubuntu
        - niki
        - guest

    - name: Setup passwordless sudo for sudo group
      ansible.builtin.lineinfile:
        path: /etc/sudoers
        state: present
        regexp: '^%sudo'
        line: '%sudo ALL=(ALL) NOPASSWD: ALL'
        validate: 'visudo -cf %s'

    - name: Add authorized SSH keys from GitHub
      ansible.posix.authorized_key:
        user: "{{ item }}"
        state: present
        key: "https://github.com/djnixy.keys"
      loop:
        - ubuntu
        - niki
        - guest

    - name: Ensure Docker service is running and enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes
