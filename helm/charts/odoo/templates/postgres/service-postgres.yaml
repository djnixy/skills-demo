{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "odoo.fullname" . }}-postgres
  labels:
    {{- include "odoo.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  selector:
    app.kubernetes.io/name: {{ include "odoo.name" . }}
    app.kubernetes.io/component: postgres
{{- end }}
