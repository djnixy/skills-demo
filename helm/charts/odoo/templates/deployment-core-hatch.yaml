{{- if .Values.hatch.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "odoo.fullname" . }}-hatch
  labels:
    {{- include "odoo.labels" . | nindent 4 }}
    app.kubernetes.io/component: hatch
spec:
  revisionHistoryLimit: 3
  {{- if not .Values.hatch.autoscaling.enabled }}
  replicas: {{ .Values.hatch.replicas }}
  {{- end }}
  strategy:
    type: {{ .Values.hatch.strategy.type | default "RollingUpdate" }}
    {{- if eq (.Values.hatch.strategy.type | default "RollingUpdate") "RollingUpdate" }}
    rollingUpdate:
      {{- if hasKey .Values.hatch.strategy.rollingUpdate "maxUnavailable" }}
      maxUnavailable: {{ .Values.hatch.strategy.rollingUpdate.maxUnavailable }}
      {{- end }}
      {{- if hasKey .Values.hatch.strategy.rollingUpdate "maxSurge" }}
      maxSurge: {{ .Values.hatch.strategy.rollingUpdate.maxSurge }}
      {{- end }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "odoo.hatch.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "odoo.hatch.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: hatch
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "odoo.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            {{- /* Base environment variables from core */ -}}
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- range $envName, $secretKey := .Values.secretEnv }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secretEnvName }}
                  key: {{ $secretKey }}
            {{- end }}
            
            {{- /* Hatch-specific overrides */ -}}
            {{- range $key, $val := .Values.hatch.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- range $envName, $secretKey := .Values.hatch.secretEnv }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.hatch.secretEnvName | default $.Values.secretEnvName }}
                  key: {{ $secretKey }}
            {{- end }}
        
          {{- if .Values.hatch.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.hatch.startupProbe.httpGet.path }}
              port: {{ .Values.hatch.startupProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.hatch.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.hatch.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.hatch.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.hatch.startupProbe.failureThreshold }}
          {{- end }}

          {{- if .Values.hatch.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.hatch.readinessProbe.httpGet.path }}
              port: {{ .Values.hatch.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.hatch.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.hatch.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.hatch.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.hatch.readinessProbe.failureThreshold }}
          {{- end }}

          {{- if .Values.hatch.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.hatch.livenessProbe.httpGet.path }}
              port: {{ .Values.hatch.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.hatch.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.hatch.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.hatch.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.hatch.livenessProbe.failureThreshold }}
          {{- end }}

          {{- with .Values.hatch.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          volumeMounts:
            - name: data-volume
              mountPath: {{ $.Values.persistence.mountPath }}
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: {{ include "odoo.fullname" . }}-pvc
            
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
