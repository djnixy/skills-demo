{{- if and .Values.hatch.ingress.enabled .Values.hatch.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "odoo.fullname" . }}-hatch
  labels:
    {{- include "odoo.labels" . | nindent 4 }}
  {{- with .Values.hatch.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.ingressClassName }}
  ingressClassName: {{ . }}
  {{- end }}

  {{- if .Values.hatch.ingress.hosts }}
  tls:
    {{- range .Values.hatch.ingress.hosts }}
    {{- with .host }}
    - hosts:
        - {{ . | quote }}
      secretName: {{ . | replace "." "-" | printf "%s-tls" }}
    {{- end }}
    {{- end }}
  {{- end }}

  rules:
    {{- range .Values.hatch.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:

          {{- if .paths }}
            {{- range .paths }}
            - path: {{ .path }}
              {{- with .pathType }}
              pathType: {{ . }}
              {{- end }}
              backend:
                service:
                  name: {{ include "odoo.fullname" $ }}-hatch
                  port:
                    number: {{ $.Values.service.port | default 8069 }}
            {{- end }}
          {{- else }}
          
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "odoo.fullname" $ }}-hatch
                port:
                  number: {{ $.Values.service.port | default 8069 }}
          {{- end }}
    {{- end }}
{{- end }}